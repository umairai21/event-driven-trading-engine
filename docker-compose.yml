version: '3.8'

services:
  nats:
    image: nats:alpine
    ports:
      - "4222:4222" 
      - "8222:8222" 
    command: ["-js"] 

  # The Relational Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=fintech_user
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=trading_simulator
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: 